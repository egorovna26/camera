<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera 1080p60</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="margin: 0;height: 100%;overflow: hidden;">
<div style="height: 100vh;display: flex;justify-content: center;align-items: center;">
    <video autoplay id="player" style="max-width: 100%;max-height: 100%;object-fit: contain;"></video>
</div>
<script>
    const player = document.getElementById('player');
    let currentStream = null;

    async function startStream() {
        const constraints = {
            audio: false,
            video: {
                width: {ideal: 1920},
                height: {ideal: 1080},
                frameRate: {ideal: 60, max: 60}
            }
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            player.srcObject = currentStream;
        } catch (err) {
            console.error('Не удалось получить доступ к камере:', err);
            alert('Ошибка: не удалось получить доступ к камере. Проверьте разрешения и подключение устройства.');
        }
    }

    window.document.addEventListener('DOMContentLoaded', () => {
        startStream()
    })
</script>
</body>
</html>
